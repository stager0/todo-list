{% extends "base.html" %}
{% block content %}
  <h1>Tags List <a class="btn btn-primary" href="{% url "workspace:tags-list-create" %}">Create</a></h1>
  <table class="table">
    <tr>
      <td>Name</td>
      <td>Update</td>
      <td>Delete</td>
    </tr>
    {% for tag in tags %}
      <tr>
        <td>{{ tag.name }}</td>
        <td>
          <a class="btn btn-warning btn-sm" href="{% url 'workspace:tag-update' tag.pk %}">Update</a>
        </td>
        <td>
          <form method="post" action="{% url 'workspace:tag-delete' tag.pk %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
          </form>
      </tr>
    {% endfor %}
  </table>
{% endblock %}
