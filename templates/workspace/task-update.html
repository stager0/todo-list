{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>Update Task</h1>
  <form method="post" action="{% url "workspace:task-update" object.pk %}">
    {% csrf_token %}
    {{ form|crispy }}
    <input class="btn btn-success" type="submit" value="Submit">
  </form>
{% endblock %}
